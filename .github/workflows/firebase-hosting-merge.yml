# Deploy to your live channel on merge
# https://github.com/FirebaseExtended/action-hosting-deploy/tree/e2eda2e106cfa35cdbcf4ac9ddaf6c4756df2c8c/

name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.0.0'

      - name: Install and Build
        run: |
          cd client
          npm ci
          npm run build

      - name: Deploy to firebase
        uses: FirebaseExtended/action-hosting-deploy@e2eda2e106cfa35cdbcf4ac9ddaf6c4756df2c8c # v0.10.0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PORTFOLIO_2D6CD }}'
          channelId: live
          projectId: portfolio-2d6cd
